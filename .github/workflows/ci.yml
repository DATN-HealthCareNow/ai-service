name: CI - Build & Push Docker Image

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "ai-service/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "ai-service/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  SERVICE_NAME: 'healthcare-ai-service'

jobs:
  build-and-push:
    # 💥 BẮT BUỘC để GitHub Actions được phép xin mượn token OIDC của AWS
    permissions:
      id-token: write 
      contents: read
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Syntax check
        run: python -m compileall ai-service/app

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- TÍCH HỢP AWS VÀ OIDC ---
      - name: 🔐 Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # Đọc từ thẻ Secrets trên GitHub

      - name: 🚪 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: 🚀 Build & Push Docker Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    needs: build-and-push # Đợi job CI làm xong mới chạy job Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # (Tùy chọn) Chỉ tự động deploy khi có code lên nhánh main
    steps:
      - name: 🚀 CD - Push code to Production Server (EC2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            echo "1. Đăng nhập vào AWS ECR..."
            aws ecr get-login-password --region ap-southeast-1 | sudo docker login --username AWS --password-stdin 632469639580.dkr.ecr.ap-southeast-1.amazonaws.com
            
            echo "2. Kéo (Pull) image mới nhất về từ ECR..."
            sudo docker pull 632469639580.dkr.ecr.ap-southeast-1.amazonaws.com/healthcare-ai-service:latest
            
            echo "3. Cập nhật và khởi động lại ai-service..."
            cd ~/devops_service || cd ~/devops-service || exit 1
            sudo docker compose up -d ai-service
            
            echo "4. Dọn dẹp các Image cũ để tránh đầy ổ cứng server..."
            sudo docker image prune -f
